<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sigilious | Contacto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/animations.css" />


</head>
<body data-page="contact">
  <div class="loader" id="loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Sigilious</div>
  </div>

  <header class="header glass">
    <nav class="nav">
      <a class="logo" href="index.html">Sigilious</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Alternar navegación">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Inicio</a>
        <a href="shop.html">Tienda</a>
        <a href="about.html">Sobre nosotros</a>
        <a href="contact.html" class="active">Contacto</a>
      </div>
      <div class="nav-actions">
        <a class="icon-btn" href="cart.html" aria-label="Carrito">
          <span class="icon">🛍️</span>
          <span class="badge" id="cartCount">0</span>
        </a>
        <a class="icon-btn" href="profile.html" aria-label="Perfil">
          <span class="icon">👤</span>
        </a>


      </div>
    </nav>
  </header>

  <main class="page fade-in">
    <section class="section">
      <div class="section-head">
        <h1>Contacto</h1>
        <p>Nos encantaría saber de ti.</p>
      </div>
      <form class="form card" id="contactForm" novalidate>
        <div class="form-row">
          <label for="name">Nombre</label>
          <input type="text" id="name" required />
          <small class="error" id="nameError"></small>
        </div>
        <div class="form-row">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" required />
          <small class="error" id="emailError"></small>
        </div>
        <div class="form-row">
          <label for="message">Mensaje</label>
          <textarea id="message" rows="5" required></textarea>
          <small class="error" id="messageError"></small>
        </div>
        <button class="btn" type="submit">Enviar mensaje</button>
        <p class="form-success" id="contactSuccess"></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">Sigilious</div>
      <p class="muted">© 2026 Sigilious. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script type="module" src="js/script.js"></script>  <button class="back-to-top" id="backToTop" aria-label="Volver arriba">↑</button>
</body>
</html>
